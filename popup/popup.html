<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1e1e38 0%, #0f0f1a 100%);
      --accent-color: #4caf50;
      --accent-hover: #45a049;
      --text-color: #ffffff;
      --text-muted: #a0a0c0;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
    }

    body {
      width: 280px;
      margin: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .title-container {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #ffffff, #cde1f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .switch-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .label-text {
      font-size: 13px;
      font-weight: 600;
    }

    .status-text {
      font-size: 11px;
      color: var(--accent-color);
      font-weight: 500;
      transition: color 0.3s;
    }

    .status-text.disabled {
      color: var(--text-muted);
    }

    /* iOS-style toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.2);
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    input:checked+.slider {
      background-color: var(--accent-color);
    }

    input:checked+.slider:before {
      transform: translateX(22px);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--card-border);
      padding-top: 12px;
    }

    .footer a {
      color: #90caf9;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #bbdefb;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="icon.png" class="logo" alt="Logo">
    <div class="title-container">
      <span class="title">Codeforces PC2 Interface</span>
      <span class="subtitle">Classic Contest Interface</span>
    </div>
  </div>

  <div class="card">
    <div class="switch-label">
      <span class="label-text">PC^2 Interface</span>
      <span id="status-desc" class="status-text">Active</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="enable-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    <span>Need help? Visit <a href="https://github.com/AbdoSleem552/Codeforces-PC2-Interface"
        target="_blank">Repository</a></span>
  </div>

  <script src="popup.js"></script>
</body>

</html>
